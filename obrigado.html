<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obrigado! - Shakaw 3D Print</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Algerian&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        /* Estilos específicos para a página de agradecimento */
        .thank-you-section {
            text-align: center;
            padding: 100px 20px;
            background-color: #2a3a4a;
            margin: 50px auto;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            max-width: 800px;
        }
        .thank-you-section h2 {
            color: #00c6ff;
            font-size: 3rem;
            margin-bottom: 20px;
        }
        .thank-you-section p {
            font-size: 1.2rem;
            color: #f0f0f0;
            margin-bottom: 30px;
        }
        .thank-you-section .home-button {
            background-color: #007bff;
            color: #fff;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            transition: background-color 0.3s ease, transform 0.2s ease;
            display: inline-block;
        }
        .thank-you-section .home-button:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <header>
        <!-- Seu cabeçalho existente -->
        <div class="container header-content">
            <div class="logo-area">
                <img src="images/Logo.png" alt="Shakaw 3D Print Logo" class="logo">
                <h2>Shakaw 3D Print</h2>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html"><i class="fas fa-home"></i> Início</a></li>
                    <li><a href="catalogo.html"><i class="fas fa-cube"></i> Catálogo</a></li>
                    <li><a href="contato.html"><i class="fas fa-project-diagram"></i> Contato</a></li>
                    <li><a href="https://www.instagram.com/shakaw3dprint" target="_blank"><i class="fab fa-instagram"></i> @shakaw3dprint</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="thank-you-section container">
            <h2>Obrigado pelo seu Interesse!</h2>
            <p>Sua lista de interesses foi enviada com sucesso. Entraremos em contato em breve para discutir seus projetos.</p>
            <a href="index.html" class="home-button">Voltar para a Página Inicial</a>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Shakaw 3D Print. Todos os direitos reservados.</p>
        </div>
    </footer>
</body>
</html>
