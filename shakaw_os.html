<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shakaw OS - Novo Pedido</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#0f172a;
      color:white;
      padding:30px;
      margin:0;
    }
    .container{
      max-width:700px;
      margin:auto;
      background:#1e293b;
      padding:25px;
      border-radius:12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }
    h2{ margin-top:0; margin-bottom:20px; }
    label{ display:block; margin-bottom:6px; font-weight:bold; }
    input, select, textarea{
      width:100%;
      padding:10px;
      margin-top:4px;
      margin-bottom:16px;
      border-radius:8px;
      border:none;
      box-sizing:border-box;
      font-size:14px;
    }
    input[readonly]{
      background:#cbd5e1;
      color:#111827;
      font-weight:bold;
    }
    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:16px;
    }
    .full{ grid-column: 1 / -1; }
    button{
      background:#38bdf8;
      color:#082f49;
      border:none;
      padding:12px;
      width:100%;
      font-size:16px;
      font-weight:bold;
      border-radius:8px;
      cursor:pointer;
      transition:0.2s;
    }
    button:hover{ background:#67e8f9; }
    .hint{
      font-size:12px;
      color:#cbd5e1;
      margin-top:-10px;
      margin-bottom:14px;
    }
    @media (max-width: 700px){
      .grid{ grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Shakaw OS - Novo Pedido</h2>

    <div class="grid">
      <div>
        <label for="cliente">Cliente</label>
        <input id="cliente" type="text" placeholder="Nome do cliente">
      </div>

      <div>
        <label for="projeto">Projeto</label>
        <input id="projeto" type="text" placeholder="Ex: Gengar Diorama">
      </div>

      <div>
        <label for="altura">Altura (cm)</label>
        <input id="altura" type="number" step="0.1" min="0" placeholder="Ex: 16">
      </div>

      <div>
        <label for="tipo">Tipo de peça</label>
        <select id="tipo">
          <option value="Figure">Figure</option>
          <option value="Diorama">Diorama</option>
          <option value="Funcional">Funcional</option>
        </select>
      </div>

      <div>
        <label for="material">Material</label>
        <select id="material">
          <option value="Resina">Resina</option>
          <option value="PLA Preto">PLA Preto</option>
          <option value="PLA Branco">PLA Branco</option>
          <option value="PLA Silk Azul">PLA Silk Azul</option>
          <option value="PLA Duo Verde">PLA Duo Verde</option>
          <option value="PETG Preto">PETG Preto</option>
          <option value="Filamento Dual Color Rosa">Filamento Dual Color Rosa</option>
          <option value="Filamento Dual Color Vermelho">Filamento Dual Color Vermelho</option>
          <option value="PLA Rosa">PLA Rosa</option>
          <option value="PLA Azul">PLA Azul</option>
          <option value="PLA Azul Metálico">PLA Azul Metálico</option>
          <option value="PLA Marrom">PLA Marrom</option>
          <option value="PLA Vermelho">PLA Vermelho</option>
          <option value="PLA Verde">PLA Verde</option>
          <option value="PLA Pele">PLA Pele</option>
        </select>
        <div class="hint">O nome precisa ser igual ao da aba Estoque.</div>
      </div>

      <div>
        <label for="peso">Peso do slicer (g)</label>
        <input id="peso" type="number" step="0.01" min="0" placeholder="Ex: 150">
        <div class="hint">Digite o peso sem perda. O sistema soma 20% apenas uma vez.</div>
      </div>

      <div>
        <label for="tempo">Tempo de impressão (h)</label>
        <input id="tempo" type="number" step="0.01" min="0" placeholder="Ex: 8">
      </div>

      <div>
        <label for="pintura">Nível de pintura</label>
        <select id="pintura">
          <option value="Sem pintura">Sem pintura</option>
          <option value="Básico">Básico</option>
          <option value="Médio">Médio</option>
          <option value="Avançado">Avançado</option>
          <option value="Extrema">Extrema</option>
        </select>
      </div>

      <div>
        <label for="linkSTL">Link STL</label>
        <input id="linkSTL" type="text" placeholder="Cole aqui o link do OneDrive">
      </div>

      <div class="full">
        <label for="observacoes">Observações</label>
        <textarea id="observacoes" rows="3" placeholder="Detalhes do pedido, cor, acabamento, observações do cliente..."></textarea>
      </div>

      <div>
        <label for="ajusteManual">Acréscimo / Desconto (R$)</label>
        <input id="ajusteManual" type="number" step="0.01" value="0" placeholder="Ex: -10 ou 15">
        <div class="hint">Use valor negativo para desconto e positivo para acréscimo.</div>
      </div>

      <div>
        <label for="motivoAjuste">Motivo do ajuste</label>
        <input id="motivoAjuste" type="text" placeholder="Ex: amigo, cliente recorrente, urgência, peça simples">
      </div>

      <div>
        <label for="impressoraPreview">Impressora sugerida</label>
        <input id="impressoraPreview" type="text" readonly>
      </div>

      <div>
        <label for="valorPreview">Valor estimado</label>
        <input id="valorPreview" type="text" readonly>
      </div>

      <div class="full">
        <button type="button" onclick="enviar()">Registrar Pedido</button>
      </div>
    </div>
  </div>

  <iframe name="hidden_iframe" style="display:none;"></iframe>

  <form id="formAppsScript" method="POST" target="hidden_iframe" style="display:none;">
    <input type="hidden" name="cliente" id="f_cliente">
    <input type="hidden" name="projeto" id="f_projeto">
    <input type="hidden" name="altura" id="f_altura">
    <input type="hidden" name="tipo" id="f_tipo">
    <input type="hidden" name="material" id="f_material">
    <input type="hidden" name="peso" id="f_peso">
    <input type="hidden" name="pesoComPerda" id="f_pesoComPerda">
    <input type="hidden" name="tempo" id="f_tempo">
    <input type="hidden" name="impressora" id="f_impressora">
    <input type="hidden" name="pintura" id="f_pintura">
    <input type="hidden" name="linkSTL" id="f_linkSTL">
    <input type="hidden" name="observacoes" id="f_observacoes">
    <input type="hidden" name="scriptVersion" id="f_scriptVersion">
    <input type="hidden" name="ajusteManual" id="f_ajusteManual">
    <input type="hidden" name="motivoAjuste" id="f_motivoAjuste">
  </form>

 <script src="script_os.js?v=V11"></script>
</body>
</html>
