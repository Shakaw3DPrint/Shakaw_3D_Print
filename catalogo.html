<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Shakaw 3D Print</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Algerian&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <header>
        <div class="container header-content">
            <div class="logo-area">
                <img src="images/Logo.png" alt="Shakaw 3D Print Logo" class="logo">
                <h2>Shakaw 3D Print</h2>  <!-- CORRIGIDO -->
            </div>
            <nav>
                <ul>
                    <li><a href="index.html"><i class="fas fa-home"></i> Início</a></li>
                    <li><a href="catalogo.html"><i class="fas fa-cube"></i> Catálogo</a></li>
                    <li><a href="contato.html"><i class="fas fa-envelope"></i> Contato</a></li>
                    <li><a href="https://www.instagram.com/shakaw3dprint" target="_blank"><i class="fab fa-instagram"></i> @shakaw3dprint</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section id="catalogo" class="section-padding">
            <div class="container">
                <h2>Nosso Catálogo de Produtos</h2>
                
                <!-- Indicador para mobile -->
                <div class="page-indicator">
                    <i class="fas fa-chevron-left"></i> Deslize para ver mais produtos <i class="fas fa-chevron-right"></i>
                </div>
                
                <!-- FILTROS - CORRETO, sem o "..." extra -->
                <div class="filters">
                    <button class="filter-btn active" data-filter="all">Todos</button>
                    <button class="filter-btn" data-filter="miniaturas3d">Miniaturas 3D</button>
                    <button class="filter-btn" data-filter="miniaturasrpg">Miniaturas RPG</button>
                    <button class="filter-btn" data-filter="dioramagaragem">Diorama Garagem</button>
                    <button class="filter-btn" data-filter="itensfuncionais">Itens Funcionais</button>
                </div>

                <div class="product-grid">
                    <!-- Todos os produtos existentes (mantidos iguais) -->
                    <!-- ... (aqui você mantém a listagem completa de produtos) ... -->
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Shakaw 3D Print. Todos os direitos reservados.</p>
        </div>
    </footer>

    <!-- Botão Ver Interesses -->
    <button id="viewInterestsBtn" title="Ver Lista de Interesses">
        <i class="fas fa-list"></i> Ver Interesses (0)
    </button>

    <!-- Botão Voltar ao Topo -->
    <button id="backToTopBtn" title="Voltar ao Topo">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- MODAL 1: Lista de Interesses -->
    <div id="interestSummaryModal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close-modal" id="closeSummaryModal">&times;</span>
            <h2><i class="fas fa-list"></i> Sua Lista de Interesses</h2>
            <ul id="selectedItemsList" class="items-summary-list"></ul>
            <button id="registerInterestsBtn" class="modal-action-btn">
                <i class="fas fa-paper-plane"></i> Registrar Interesses
            </button>
        </div>
    </div>

    <!-- MODAL 2: Formulário -->
    <div id="contactFormModal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close-modal" id="closeContactFormModal">&times;</span>
            <h2><i class="fas fa-envelope"></i> Enviar Interesses</h2>
            <form id="contactForm"
                  action="https://formsubmit.co/contato@shakaw3dprint.com.br"
                  method="POST">
                <input type="hidden" name="_subject" value="Novo interesse - Shakaw 3D Print">
                <input type="hidden" name="_autoresponse" value="Recebemos seu interesse! Entraremos em contato em breve.">
                <input type="hidden" name="_template" value="box">
                <input type="hidden" name="_next" value="https://shakaw3dprint.github.io/Shakaw_3D_Print/obrigado.html">
                <input type="hidden" name="itens_de_interesse" id="itemsData">
                <div class="form-section">
                    <label for="name">Nome Completo:</label>
                    <input type="text" id="name" name="name" placeholder="Seu nome completo" required>
                </div>
                <div class="form-section">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                </div>
                <div class="form-section">
                    <label for="whatsapp">WhatsApp:</label>
                    <input type="tel" id="whatsapp" name="whatsapp" placeholder="(XX) XXXXX-XXXX">
                </div>
                <div class="form-section">
                    <label for="message">Mensagem Adicional:</label>
                    <textarea id="message" name="message" rows="3"
                              placeholder="Alguma observação ou dúvida?"></textarea>
                </div>
                <button type="submit">
                    <i class="fas fa-paper-plane"></i> Enviar
                </button>
            </form>
        </div>
    </div>

    <!-- LIGHTBOX -->
    <div id="lightbox" style="display:none;">
        <div id="lightbox-overlay"></div>
        <div id="lightbox-container">
            <button id="lightbox-close">&times;</button>
            <button id="lightbox-prev"><i class="fas fa-chevron-left"></i></button>
            <img id="lightbox-img" src="" alt="">
            <button id="lightbox-next"><i class="fas fa-chevron-right"></i></button>
            <div id="lightbox-zoom-controls">
                <button id="zoom-out"><i class="fas fa-search-minus"></i></button>
                <span id="zoom-level">100%</span>
                <button id="zoom-in"><i class="fas fa-search-plus"></i></button>
                <button id="zoom-reset"><i class="fas fa-expand"></i></button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
